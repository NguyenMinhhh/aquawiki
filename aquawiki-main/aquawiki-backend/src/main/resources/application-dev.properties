# AI Fish Identification — Fishial.AI Cloud API v2 (Story 7.1). Free Developers API.
# Flow: POST /v2/auth (client_id+client_secret -> Bearer) -> POST /v2/recognize (raw image bytes).
# Đổi account Fishial: dán client_id/client_secret mới vào 2 dòng dưới rồi restart backend.
# (Biến môi trường FISHIAL_CLIENT_ID / FISHIAL_CLIENT_SECRET nếu có sẽ override giá trị trong file.)
# Để trống cả hai -> endpoint /api/identify trả 503 (tính năng tắt).
